version: "3.9"
services:
  api:
    build: .
    ports:
      - "8081:5000"
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "technical_test:create_app()"]
    environment:
      - APP_SETTINGS=instance/settings.json
    volumes:
      - ./instance:/var/app/instance
      - ./technical_test:/var/app/technical_test
    restart: on-failure
    depends_on:
      - mongo

  worker:
    build: .

    command: ['python', 'technical_test/worker.py']
    environment:
      - APP_SETTINGS=instance/settings.json
    volumes:
      - ./instance:/var/app/instance
      - ./technical_test:/var/app/technical_test
    restart: on-failure
    depends_on:
      - rabbitmq
      - mongo

  rabbitmq:
    image: rabbitmq:3.8
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15672"]
      interval: 30s
      timeout: 10s
      retries: 5

  mongo:
    image: mongo
    ports:
      - "27017:27017"
